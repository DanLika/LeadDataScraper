[pytest]
# Test organization (see tests/quality/test-reorg-report.md):
#
#   tests/unit/         pure unit tests — fast, no I/O, no external services
#   tests/integration/  hit real DB / Supabase / Gemini API (skipped without creds)
#   tests/e2e/          full-stack via Playwright / live infra (slowest)
#   tests/security/     auth bypass, injection, CSRF, CRLF, SSRF, prompt-injection corpus
#   tests/quality/      meta-tests (Pydantic field-level enforcement, mypy gates)
#
# Markers tag tests INDEPENDENTLY of directory placement. A test in
# tests/integration/ usually also carries @pytest.mark.live; the CLI
# filter below strips both so the default `pytest` run stays fast.

testpaths = tests

# Default CLI filter — drops slow + live tests so `pytest` runs the
# fast suite by default. Override for full run: `pytest -m ""`.
# Mirrors the CI gate in .github/workflows/ci.yml.
addopts =
    -m "not slow and not live"

markers =
    slow: takes >5s — full file scans, hypothesis fuzz with high example counts
    live: requires real external services (Supabase / Gemini / SMTP / Playwright)
    security: security-invariant tests — auth bypass, injection corpus, CSRF, CRLF, SSRF, prompt injection. Some overlap with unit/ (when no I/O) and integration/ (when live infra is required)
    integration: needs a running DB or live Supabase project (skipped when env vars absent)
    e2e: end-to-end via Playwright + running backend + live Supabase
    smoke: offline smoke tests that pin engine invariants (Phase 14/15 sequencing — template_renderer, send_window, variant_selector, sequence_advancer). Opt-in: `pytest -m smoke` for the fast contract battery.
