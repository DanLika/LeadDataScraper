version: 2

# Dependabot opens PRs for outdated deps. The companion workflow
# `.github/workflows/dependabot-auto-merge.yml` flips `--auto` on
# patch-update PRs so they merge themselves AFTER every required CI
# check (pytest, pip-audit, npm audit, gitleaks, semgrep, ruff, mypy,
# ESLint, Playwright, schema-drift, referential-integrity, Lighthouse,
# container-scan) goes green. Patch updates with a failing security
# scan or test will NOT auto-merge — branch protection still gates.
#
# Minor + major bumps stay manual. Reviewer DanLika is assigned by
# Dependabot directly (the field below); branch protection enforces
# the actual approval count.
#
# Each ecosystem reads the trailing `# vX.Y.Z` comment on SHA-pinned
# references (workflows) or the lockfile + manifest (pip/npm/docker)
# to determine the next bump. The "deps:" prefix matches the existing
# conventional-commits scope in this repo.

updates:
  # Python — pip resolves requirements.txt + the transitive tree.
  # The pip-audit job in ci.yml + security.yml blocks any bump that
  # introduces a known CVE, so an auto-merged patch can't ship a CVE.
  #
  # KNOWN LIMITATION (PR #220 numpy 2.4.6 incident, 2026-05-28):
  # Dependabot's pip ecosystem only knows about requirements.txt — it
  # cannot read or write requirements.in. Bumps therefore land in the
  # LOCKFILE only, leaving the source-of-truth (requirements.in) stale.
  # numpy 2.4 dropped Python 3.10 support, the bot bumped requirements.txt
  # while requirements.in still said "numpy>=2.2", and 5 Render deploys
  # failed before the rollback.
  #
  # MITIGATION (two gates, defense-in-depth):
  #   1. `requirements.txt ↔ requirements.in sync` job in ci.yml re-runs
  #      pip-compile on every PR touching requirements.{in,txt} and fails
  #      when the regenerated lockfile differs from the committed one.
  #      Catches Dependabot bumps that requirements.in's pins refuse.
  #   2. `dependabot-pip-route-check.yml` enforces the upstream invariant:
  #      a PR that edits requirements.txt MUST also edit requirements.in
  #      (or include `[skip-route-check]` in a commit message). Catches
  #      Dependabot bumps that drift would coincidentally green-light
  #      because requirements.in's pins are too loose.
  #
  # Both gates block auto-merge via branch protection on `main`. Operator
  # workflow on a red Dependabot pip PR: apply the same version pin to
  # requirements.in, run `make lock-python`, force-push — or reject.
  #
  # WARNING: do NOT bypass these gates via admin-merge. PR #220
  # (numpy 2.4.6 / Py3.10) shipped via that path and broke 5 deploys.
  # The gates exist BECAUSE manual review missed Py-compat regression.
  #
  # Future improvement: a workflow that auto-mirrors Dependabot's
  # requirements.txt bump into requirements.in + regenerates the lockfile,
  # so the gate becomes self-healing. Not wired yet — manual rebase is
  # acceptable for ~5 pip PRs/week.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    reviewers:
      - DanLika
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      # Single PR for ALL patch bumps as requested — keeps the review
      # surface to one diff per week instead of N flake-prone PRs.
      pip-patches:
        update-types:
          - patch
        patterns:
          - "*"

  # Frontend npm — dev and prod grouped separately so a runtime-dep
  # bump (e.g. next, @supabase/ssr) isn't bundled with a CI tooling
  # bump (eslint, typescript). Easier to revert just one half if
  # something breaks.
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    reviewers:
      - DanLika
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      npm-prod:
        dependency-type: production
        update-types:
          - minor
          - patch
        patterns:
          - "*"
      npm-dev:
        dependency-type: development
        update-types:
          - minor
          - patch
        patterns:
          - "*"

  # GitHub Actions — paired with SHA pinning (every `uses: org/action@<sha>
  # # vX.Y.Z` line in .github/workflows/*.yml). Dependabot reads the
  # trailing tag comment, queries the action's releases, and bumps SHA +
  # comment together. Without this, the SHA-pin becomes a freeze.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    reviewers:
      - DanLika
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
        patterns:
          - "*"

  # Dockerfile base image — `FROM mcr.microsoft.com/playwright/python:
  # v1.40.0-jammy`. Trivy + Grype in container-scan will flag CVEs in
  # the running image; Dependabot opens the bump PR that clears them.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    reviewers:
      - DanLika
    commit-message:
      prefix: "deps"
      include: scope
