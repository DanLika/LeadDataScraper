name: e2e

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/e2e.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

# Fork-PR guard mirrors security.yml — a hostile fork PR must not run
# inside the trusted runner with secrets attached.
jobs:
  playwright:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      E2E_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
      E2E_API_KEY: ${{ secrets.E2E_API_KEY }}
      E2E_ADMIN_TOKEN: ${{ secrets.E2E_ADMIN_TOKEN }}
      E2E_BACKEND_URL: ${{ secrets.E2E_BACKEND_URL }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run E2E (chromium only on PR, full matrix on main)
        env:
          GH_REF: ${{ github.ref }}
        run: |
          if [ "$GH_REF" = "refs/heads/main" ]; then
            npm run e2e
          else
            npm run e2e -- --project=chromium
          fi

      # Worth its weight in gold debugging flaky CI runs. Failure artifact
      # carries playwright traces (open with `npx playwright show-trace`),
      # videos, screenshots, and the HTML report.
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: playwright-results-${{ github.run_id }}
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 14
          if-no-files-found: ignore
