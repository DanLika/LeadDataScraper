name: data-integrity

# Silent assertions on prod data. Read-only — no writes. Alerts the
# operator with offending row IDs on any anomaly. See
# .github/scripts/data-integrity-cron.mjs for the 5 checks.

on:
  schedule:
    - cron: '17 4 * * *'  # 04:17 UTC daily — off-peak vs other crons
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: data-integrity
  cancel-in-progress: false

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SLACK_WEBHOOK_URL:         ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Run integrity checks
        run: node .github/scripts/data-integrity-cron.mjs
