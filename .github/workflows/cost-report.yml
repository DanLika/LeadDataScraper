name: cost-report

# Weekly cost digest. Aggregates per-provider spend (Gemini, Supabase,
# Render, Google Maps if it ever has cost, domain + SSL) into a single
# Markdown summary, posts to Discord, and uploads as a workflow artifact
# for historical comparison.
#
# Goal: catch runaway costs before they break the budget. The week-over-
# week delta is the actionable signal — a 3x jump in Gemini spend
# without a 3x jump in lead volume is a leak somewhere.
#
# Sources today:
#   • Gemini → derived from backend log parsing (count of structured
#     "gemini_call" log lines × pinned per-call cost; rough but
#     directional). Better: pull from Google AI Studio's billing API
#     when that lands.
#   • Supabase → REST API: `pg_database_size` + project plan
#   • Render → REST API: service plans + bandwidth
#   • Google Maps → today scraped via Playwright (no API key), so $0.
#     Documented for when/if we switch to the official Places API.
#   • Domain + SSL → flat annual cost, prorated weekly.
#
# `src/scripts/cost_report.py` does the heavy lifting; this workflow is
# the scheduling + Discord delivery glue.

on:
  schedule:
    # Mondays 08:00 UTC — start-of-week visibility.
    - cron: '0 8 * * MON'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  report:
    name: Aggregate + post weekly cost digest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests "psycopg[binary]>=3.1"

      - name: Generate weekly cost digest
        id: digest
        env:
          # Per-provider creds. Each is independently optional; the
          # report omits a source it can't read rather than failing.
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF:  ${{ secrets.SUPABASE_PROJECT_REF }}
          DATABASE_URL:          ${{ secrets.SUPABASE_DATABASE_URL }}
          RENDER_API_KEY:        ${{ secrets.RENDER_API_KEY }}
          RENDER_BACKEND_SERVICE_ID:  ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
          RENDER_FRONTEND_SERVICE_ID: ${{ secrets.RENDER_FRONTEND_SERVICE_ID }}
          # Pinned annual costs — update when the operator changes plan.
          DOMAIN_ANNUAL_COST_USD: ${{ vars.DOMAIN_ANNUAL_COST_USD || '15' }}
          # Per-call Gemini cost (Flash 1.5, USD). Update when the model
          # or pricing tier changes. See test_ai_cost_budget.py for the
          # corresponding test-side pin.
          GEMINI_AVG_COST_USD: ${{ vars.GEMINI_AVG_COST_USD || '0.0008' }}
        run: |
          set -euo pipefail
          python -m src.scripts.cost_report > digest.md
          echo "--- digest.md preview ---"
          head -40 digest.md
          # Emit as multi-line step output for the Discord step.
          {
            echo "body<<__EOF__"
            cat digest.md
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Upload digest as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: cost-digest-${{ github.run_id }}
          path: digest.md
          retention-days: 365   # full year of weekly digests for trend analysis

      - name: Post digest to Discord
        uses: ./.github/actions/discord-notify
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          severity: info
          title: "💸 Weekly cost digest"
          message: ${{ steps.digest.outputs.body }}
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
