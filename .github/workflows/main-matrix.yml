name: main-matrix

# Runtime-compat matrix on push to main. PRs run a single version of
# Python (3.12) + Node (20) via ci.yml for speed; main pushes additionally
# exercise the next major and previous minor so a Render runtime bump
# can't silently land a regression.
#
# Triggers on push to main (post-merge). The cron lets a runtime-DB
# decision (e.g. CVE fixed in 3.13 only) get re-validated daily even
# without a new merge.

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 5 * * *'   # daily 05:00 UTC, after security.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  python-matrix:
    name: pytest (python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov hypothesis hypothesis-jsonschema
      - name: Run pytest
        # No coverage gate here — ci.yml owns the 95% gate on 3.12. This
        # matrix proves the suite still PASSES on the bracketed runtimes;
        # the coverage gate stays single-runtime to avoid flakes from
        # coverage tool version skew.
        run: pytest -q

  node-matrix:
    name: npm test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm test
      # Build too — catches Next.js / TS API drift between Node versions.
      - run: npm run build
