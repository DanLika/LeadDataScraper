name: Migration safety (preview-branch verification)

# Disabled by default — `workflow_dispatch` only. Enable as a required
# status check on PRs that touch `supabase_schema.sql` or
# `supabase/migrations/**` once the prerequisites below are satisfied.
#
# WHAT IT DOES
# A PR that changes the schema gets a preview Supabase branch with the
# new migration applied; the existing DB gates (schema-drift,
# integrity, query-plans) run against that branch. Only if they all
# pass does the PR become mergeable. Catches:
#   - migrations that drop an index a hot path depends on
#   - migrations that break an FK invariant the integrity test catches
#   - migrations that drift from `supabase_schema.sql` (i.e. the file
#     wasn't kept in sync with the SQL applied to the branch)
#
# PREREQUISITES
#   - Supabase plan: Pro or higher (Database Branching is enabled).
#   - Repo secrets:
#       SUPABASE_ACCESS_TOKEN   — PAT with branch:* perms
#       SUPABASE_PROJECT_REF    — main project ref
#   - Branch protection on `main`: add `migration-safety` to the
#     required status checks list once this workflow is enabled.
#
# ENABLING
# Replace the `on: workflow_dispatch:` block with the commented
# `on: pull_request:` paths block below. The paths filter ensures
# this job only fires on PRs that actually touch schema, keeping
# branch-create cost bounded.

on:
  workflow_dispatch:
  # pull_request:
  #   paths:
  #     - 'supabase_schema.sql'
  #     - 'supabase/migrations/**'
  #     - 'src/scripts/schema_drift_check.py'  # keeps the gate honest if the gate logic itself changes

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preview-branch-verify:
    name: Apply migration to preview branch + run DB gates
    runs-on: ubuntu-latest
    # Skip on fork PRs — needs SUPABASE_ACCESS_TOKEN secret.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "psycopg[binary]>=3.1"

      - name: Verify prerequisites
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_ACCESS_TOKEN:-}" || -z "${SUPABASE_PROJECT_REF:-}" ]]; then
            echo "::error::SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF not set."
            exit 1
          fi

      # ---------------------------------------------------------------
      # 1. Create preview branch from current main (no restore_target —
      # a fresh branch with the latest commit's migrations applied).
      # ---------------------------------------------------------------
      - name: Create preview branch
        id: create
        run: |
          set -euo pipefail
          name="pr-${{ github.event.pull_request.number || github.run_id }}-$(date +%s)"
          response=$(curl -sS -X POST \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"branch_name\":\"$name\"}" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/branches")
          branch_ref=$(echo "$response" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("ref",""))')
          if [[ -z "$branch_ref" ]]; then
            echo "::error::Branch creation failed: $response"
            exit 1
          fi
          echo "branch_ref=$branch_ref" >> "$GITHUB_OUTPUT"

      - name: Wait for branch ACTIVE_HEALTHY + capture DSN
        id: dsn
        env:
          BRANCH_REF: ${{ steps.create.outputs.branch_ref }}
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            response=$(curl -sS \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              "https://api.supabase.com/v1/branches/$BRANCH_REF")
            status=$(echo "$response" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("status",""))')
            if [[ "$status" == "ACTIVE_HEALTHY" ]]; then
              db_url=$(echo "$response" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("connection_string",""))')
              echo "db_url=$db_url" >> "$GITHUB_OUTPUT"
              break
            fi
            sleep 5
          done
          if [[ -z "${db_url:-}" ]]; then
            echo "::error::Preview branch never reached ACTIVE_HEALTHY"
            exit 1
          fi

      # ---------------------------------------------------------------
      # 2. Apply the new schema to the preview branch.
      # If the branch already contains the latest commit (Supabase
      # auto-applies committed migrations), this is a no-op idempotent
      # apply. Otherwise it re-runs supabase_schema.sql.
      # ---------------------------------------------------------------
      - name: Apply supabase_schema.sql to preview branch
        env:
          DATABASE_URL: ${{ steps.dsn.outputs.db_url }}
        run: |
          set -euo pipefail
          python3 - <<'PYTHON'
          import os, psycopg
          with psycopg.connect(os.environ["DATABASE_URL"], autocommit=True) as c:
              with open("supabase_schema.sql") as f:
                  c.execute(f.read())
          print("supabase_schema.sql applied successfully.")
          PYTHON

      # ---------------------------------------------------------------
      # 3-5. Run the existing DB gates against the preview branch.
      # Same scripts that gate prod — if they pass here, the migration
      # is structurally safe.
      # ---------------------------------------------------------------
      - name: schema-drift against preview
        env:
          DATABASE_URL: ${{ steps.dsn.outputs.db_url }}
        run: python -m src.scripts.schema_drift_check

      - name: referential-integrity against preview
        env:
          DATABASE_URL: ${{ steps.dsn.outputs.db_url }}
        run: python -m src.scripts.check_referential_integrity

      - name: query-plans against preview
        env:
          DATABASE_URL: ${{ steps.dsn.outputs.db_url }}
        run: python -m src.scripts.check_query_plans

      - name: backend tests against preview
        env:
          # Backend test suite uses Supabase REST URL not Postgres URL.
          # If you maintain a separate `SUPABASE_PREVIEW_URL`, wire it
          # here. Optional — comment out if the unit suite doesn't
          # need DB access.
          SUPABASE_URL: ${{ steps.dsn.outputs.db_url }}
        run: pytest tests/ -x -k 'not integration'
        continue-on-error: true  # backend unit tests don't all need DB; soft-fail keeps signal focused on schema steps

      # ---------------------------------------------------------------
      # 6. Always delete the preview branch — don't leak quota.
      # ---------------------------------------------------------------
      - name: Delete preview branch
        if: always() && steps.create.outputs.branch_ref != ''
        env:
          BRANCH_REF: ${{ steps.create.outputs.branch_ref }}
        run: |
          curl -sS -X DELETE \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/branches/$BRANCH_REF" \
            && echo "Preview branch $BRANCH_REF deleted." \
            || echo "::warning::Preview branch delete failed; clean up manually."
