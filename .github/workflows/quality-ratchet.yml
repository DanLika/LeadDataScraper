name: Quality Ratchet

# Runs ruff / mypy / pylint / eslint / semgrep against the committed
# baselines in .quality-baselines.json. Fails the build if any metric
# regresses. See scripts/check-quality-baselines.py for the comparator
# logic and the per-metric direction (`operator: "gte"` for
# higher-is-better; default `"lte"` for lower-is-better).
#
# The workflow is FAIL-CLOSED on a tool that errors out: a parser
# failure on any metric exits 2 from check-quality-baselines.py,
# which CI treats as a failure. Don't paper over a broken tool by
# raising the baseline — fix the tool invocation first.
#
# Fork-PR guard: each job carries the same head-repo check used by
# every other workflow under .github/workflows/ (per ci-architecture.md),
# so a hostile fork PR can't feed a manipulated baselines file or a
# `requirements.txt` whose setup.py runs arbitrary code in the runner.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: quality-ratchet-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ratchet:
    name: Quality ratchet (ruff / mypy / pylint / eslint / semgrep)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        # actions/checkout pinned per workflow-pin invariant in CLAUDE.md
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          # Tool versions intentionally NOT pinned in requirements.txt
          # because they're CI-only — but pinning here keeps the
          # baseline-vs-current comparison apples-to-apples across runs.
          pip install \
            ruff==0.14.5 \
            mypy==2.1.0 \
            pylint==4.0.5 \
            semgrep==1.156.0 \
            pandas-stubs

      - name: Setup Node
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e  # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Verify baselines file exists
        run: |
          if [ ! -f .quality-baselines.json ]; then
            echo "::error::.quality-baselines.json missing — see scripts/capture-quality-baselines.sh"
            exit 2
          fi

      - name: Run quality ratchet
        run: |
          python scripts/check-quality-baselines.py
        # Tool-level exit codes are absorbed by the comparator; only the
        # comparator's exit code propagates here. Non-zero = regression
        # (or a tool failure, which is also fail-closed by design).

      - name: Suggest baseline update (informational; never fails)
        if: success()
        run: |
          # The pass path prints any per-metric improvement hints; this
          # step just makes them more visible in the run summary.
          echo "Quality ratchet PASS — see the previous step's output for"
          echo "any 'baseline can drop' suggestions if a metric improved."
