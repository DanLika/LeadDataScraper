name: pr-hygiene

# Two checks on every PR:
#   1. Title follows Conventional Commits (feat:, fix:, security:, etc.)
#   2. Diff size:
#        < 400 lines : pass
#        400–800     : warn, label size/large
#        > 800       : fail, label size/xl, require justification in body
#
# Why: a 2000-line PR doesn't get a real security review — the reviewer
# skims. Forcing incremental PRs preserves review fidelity exactly where
# this repo is most exposed (auth middleware, SSRF guard, prompt fence).

on:
  pull_request:
    # `edited` re-fires when the title/body changes so the check
    # auto-revalidates after the author edits in response to a fail.
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write  # label add/remove + body annotation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  semantic-title:
    name: Conventional Commits title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50  # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Repo-specific scope: `security:` is required for any change
          # touching auth / SSRF / prompt fence — pairs with CODEOWNERS
          # gate on those paths.
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            perf
            security
          requireScope: false
          # Lowercase enforced; subject must not end in period.
          subjectPattern: ^(?![A-Z]).+[^.]$
          subjectPatternError: |
            The subject of the PR title must start with a lowercase letter
            and not end with a period. Example:
              feat(auth): add rate limit to login throttle
              security: tighten SSRF guard against IPv6 multicast

  size-check:
    name: PR size gate
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      WARN_THRESHOLD: '400'
      FAIL_THRESHOLD: '800'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Measure diff size
        id: size
        # Net lines = additions + deletions across all PR files,
        # excluding lockfiles (generated) and snapshot/golden files
        # (auto-generated by test scaffolding). Tweak the exclude list
        # if a new file type is added that legitimately balloons the count.
        run: |
          set -euo pipefail
          gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" \
            --json files \
            --jq '.files[]' > files.jsonl
          total=$(jq -s '
            map(select(
              .path | test(
                "(^|/)(package-lock\\.json|yarn\\.lock|Pipfile\\.lock|poetry\\.lock|requirements\\.txt|.*\\.snap|.*__snapshots__/.*)$"
              ) | not
            ))
            | map(.additions + .deletions)
            | add // 0
          ' files.jsonl)
          echo "lines=$total" >> "$GITHUB_OUTPUT"
          echo "Net diff (excluding lockfiles + snapshots): $total"
      - name: Apply size label + gate
        env:
          LINES: ${{ steps.size.outputs.lines }}
        run: |
          set -euo pipefail
          # Always start by removing prior size labels so a shrunken PR
          # doesn't keep its old size/xl after a revision.
          for L in size/large size/xl; do
            gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" \
              --remove-label "$L" 2>/dev/null || true
          done
          if [ "$LINES" -gt "$FAIL_THRESHOLD" ]; then
            gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" \
              --add-label size/xl || true
            # Require a body block "## Why this PR is large" with at
            # least one non-empty line under it.
            body=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" \
              --json body --jq .body)
            if ! echo "$body" | grep -A2 -i '^##* *Why this PR is large' \
                 | tail -n +2 | grep -q '[^[:space:]]'; then
              echo "::error::PR is ${LINES} lines (> ${FAIL_THRESHOLD})."
              echo "Either split into smaller PRs, or add a section to the PR"
              echo "body titled '## Why this PR is large' explaining the"
              echo "scope (multi-file refactor, code-mod, etc.)."
              exit 1
            fi
            echo "::warning::PR is ${LINES} lines but justification block is present."
          elif [ "$LINES" -gt "$WARN_THRESHOLD" ]; then
            gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" \
              --add-label size/large || true
            echo "::warning::PR is ${LINES} lines (warn threshold ${WARN_THRESHOLD})."
          else
            echo "PR size OK (${LINES} lines)."
          fi
