name: workflow-drift

# Meta-CI: assert no workflow file changed without a merged PR.
#
# Two independent checks fire on every daily run:
#
#   1. HASH DRIFT — Recompute sha256 of each workflow file and compare
#      against .github/workflow-hashes.json. Mismatch = someone edited
#      a workflow without updating the snapshot. Intentional edits MUST
#      be paired with `make workflow-hashes` in the same PR; CODEOWNERS
#      gates /.github/ on DanLika so unreviewed edits can't slip in.
#
#   2. UNTRACKED COMMITS — For every commit in the last 25h that
#      touches `.github/workflows/`, check via `gh api` whether a
#      MERGED pull request is associated. A direct push to main
#      (admin bypass of branch protection, force-push that landed
#      somehow, accidentally-leaked-PAT scenario) leaves no PR. The
#      job opens a tracker issue with the commit SHA + author.
#
# Pairs with: required signed commits + linear history + admin-bypass
# alerts. This workflow is the alarm when those upstream controls fail.

on:
  schedule:
    - cron: '0 4 * * *'   # daily, 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  drift:
    name: Hash drift + untracked-commit audit
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # Need ≥ 25h of history for the untracked-commit walk.
          fetch-depth: 100
      - name: Hash drift check
        id: drift
        run: |
          set -euo pipefail
          report=""
          while IFS= read -r f; do
            name=$(basename "$f")
            actual=$(shasum -a 256 "$f" | awk '{print $1}')
            expected=$(jq -r --arg n "$name" '.files[$n] // empty' \
              .github/workflow-hashes.json)
            if [ -z "$expected" ]; then
              report="${report}- **${name}** has no snapshot entry — add it via \`make workflow-hashes\`\n"
              continue
            fi
            if [ "$actual" != "$expected" ]; then
              report="${report}- **${name}**: expected \`${expected:0:12}…\`, actual \`${actual:0:12}…\`\n"
            fi
          done < <(find .github/workflows -name '*.yml' | sort)
          # Inverse: snapshot lists a file that no longer exists.
          for snap in $(jq -r '.files | keys[]' .github/workflow-hashes.json); do
            if [ ! -f ".github/workflows/${snap}" ]; then
              report="${report}- **${snap}**: in snapshot but file missing\n"
            fi
          done
          if [ -n "$report" ]; then
            { echo 'drift<<EOF'; printf '%b' "$report"; echo 'EOF'; } >> "$GITHUB_OUTPUT"
            echo "Drift detected:"
            printf '%b' "$report"
          else
            echo "No hash drift."
          fi
      - name: Untracked-commit audit
        id: untracked
        run: |
          set -euo pipefail
          since=$(date -u -d '25 hours ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
            || python3 -c "from datetime import datetime,timedelta,timezone; print((datetime.now(timezone.utc)-timedelta(hours=25)).strftime('%Y-%m-%dT%H:%M:%SZ'))")
          # Commits touching workflows in the window.
          commits=$(git log --since="$since" --format='%H' -- .github/workflows/ || true)
          report=""
          for sha in $commits; do
            # Per-commit PR lookup. `gh api` returns an array of PRs whose
            # tip commit matches OR which include this commit as merged.
            prs=$(gh api "repos/${{ github.repository }}/commits/${sha}/pulls" \
              --jq '[.[] | select(.merged_at != null)] | length' 2>/dev/null || echo 0)
            if [ "$prs" = "0" ]; then
              author=$(git log -1 --format='%an <%ae>' "$sha")
              subject=$(git log -1 --format='%s' "$sha")
              report="${report}- \`${sha:0:12}\` by ${author}: \`${subject}\`\n"
            fi
          done
          if [ -n "$report" ]; then
            { echo 'untracked<<EOF'; printf '%b' "$report"; echo 'EOF'; } >> "$GITHUB_OUTPUT"
            echo "Untracked commits detected:"
            printf '%b' "$report"
          else
            echo "No untracked commits."
          fi
      - name: Open or update drift tracker issue
        if: steps.drift.outputs.drift != '' || steps.untracked.outputs.untracked != ''
        # `printf` for the body to preserve newlines from $GITHUB_OUTPUT.
        run: |
          set -euo pipefail
          export TITLE="Workflow drift detected"
          body=$(printf 'Auto-generated by `workflow-drift.yml` on %s.\n\n' "$(date -u --iso-8601=seconds 2>/dev/null || date -u +%FT%TZ)")
          if [ -n "${{ steps.drift.outputs.drift }}" ]; then
            body="${body}## Hash drift\n\n${{ steps.drift.outputs.drift }}\n"
          fi
          if [ -n "${{ steps.untracked.outputs.untracked }}" ]; then
            body="${body}\n## Commits touching .github/workflows/ without merged PR\n\n${{ steps.untracked.outputs.untracked }}\n"
          fi
          body="${body}\n## Resolve\n\n1. If the change was intentional: review the diff, ensure CODEOWNERS approved the PR, then run \`make workflow-hashes\` and commit.\n2. If the change was NOT intentional: rotate any PAT with workflow-edit scope, audit recent admin actions in the org log, and revert via PR.\n"
          existing=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label workflow-drift \
            --state open \
            --json number,title \
            --jq '.[] | select(.title==env.TITLE) | .number' \
            -L 1 || echo "")
          # gh expects body as a real file or arg — write tmp file with
          # newlines materialized.
          printf '%b' "$body" > /tmp/issue-body.md
          if [ -z "$existing" ]; then
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "$TITLE" \
              --body-file /tmp/issue-body.md \
              --label workflow-drift
          else
            gh issue edit "$existing" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/issue-body.md
          fi
          # Slack ping if configured.
          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            payload=$(jq -n --arg t "$TITLE" --arg url "${{ github.server_url }}/${{ github.repository }}/issues" \
              '{text: ("🚨 " + $t + " — " + $url)}')
            curl -fsS -X POST -H 'Content-Type: application/json' \
              -d "$payload" "$SLACK_WEBHOOK_URL" || true
          fi
          echo "::error::Workflow drift detected — see tracker issue."
          exit 1
