services:
  # Backend Service (Using Docker for reliable Playwright execution)
  - type: web
    name: lead-scraper-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: starter # Recommendation: starter or higher for browser automation stability
    envVars:
      - key: SUPABASE_URL
        sync: false
      # Backend uses the SERVICE ROLE key (RLS bypass for server-side ops).
      # ANON key is no longer used by the backend.
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: API_SECRET_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      # Single-tenancy invariant. When set, the backend's lifespan asserts
      # Supabase Auth has exactly this one user at boot and fails loudly
      # if a second user is ever provisioned (per-resource endpoints have
      # no owner_user_id filter — design assumes one operator).
      - key: OPERATOR_EMAIL
        sync: false
      # Operator signature appended to outreach drafts. Unset → drafts sign
      # with "Your Name" placeholder.
      - key: OPERATOR_NAME
        sync: false
      # Sentry error tracking + APM. Same DSN string as the frontend's
      # NEXT_PUBLIC_SENTRY_DSN; backend init in backend/main.py runs
      # only when this is set (dev / preview without Sentry stays clean).
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      # Temporarily set to "1" to expose POST /_sentry/test for boot-time
      # verification. Unset (or set to anything else) in normal operation.
      - key: SENTRY_TEST_ENABLED
        sync: false
      - key: PYTHON_ENV
        value: production

  # Frontend Service (Next.js) — talks to the backend ONLY via a server-side
  # proxy route. The backend X-API-Key is held server-side and must never use
  # the NEXT_PUBLIC_ prefix.
  - type: web
    name: lead-scraper-frontend
    env: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    plan: starter
    envVars:
      # Server-side only: Next.js proxy forwards browser calls here.
      - key: BACKEND_URL
        fromService:
          type: web
          name: lead-scraper-backend
          property: host
      # Server-side only — NOT NEXT_PUBLIC_. Used by the /api/proxy route.
      - key: API_SECRET_KEY
        sync: false
      # Render's edge sets the real client IP on X-Forwarded-For. The proxy
      # strips client-sent XFF (anti-spoof) and re-emits the trusted header's
      # first hop so the backend rate limiter buckets per user, not per proxy.
      - key: TRUSTED_CLIENT_IP_HEADER
        value: x-forwarded-for
      # Origin allowlist — read by /api/proxy and /api/auth/signout to gate
      # state-changing POST/PUT/DELETE. Must include the prod frontend URL
      # (comma-separated for multiple). Unset → defaults to localhost only
      # and every prod write fails closed with 403.
      - key: ALLOWED_ORIGINS
        sync: false
      # Server-side only — must match backend ADMIN_TOKEN. Proxy injects on
      # /leads/clear path. Unset → "Clear All Leads" UI 403s.
      - key: ADMIN_TOKEN
        sync: false
      # Public — Supabase auth/publishable key. RLS prevents data access.
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      # Sentry — same DSN exposed both server-side (SENTRY_DSN, read by
      # sentry.server.config.ts / sentry.edge.config.ts) and client-side
      # (NEXT_PUBLIC_SENTRY_DSN, read by instrumentation-client.ts). DSNs
      # are designed to be public — see Sentry docs.
      - key: SENTRY_DSN
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: NEXT_PUBLIC_SENTRY_ENVIRONMENT
        value: production
      # Build-time source-map upload. SENTRY_AUTH_TOKEN is the secret;
      # SENTRY_ORG + SENTRY_PROJECT name the destination. Without these,
      # `next build` skips source-map upload (stack traces in Sentry stay
      # minified — broken). Set in the Render dashboard.
      - key: SENTRY_ORG
        sync: false
      - key: SENTRY_PROJECT
        sync: false
      - key: SENTRY_AUTH_TOKEN
        sync: false
      # SENTRY_RELEASE / NEXT_PUBLIC_SENTRY_RELEASE: auto-resolved at
      # build time from Render's auto-exposed RENDER_GIT_COMMIT via the
      # fallback chain in frontend/next.config.ts. No explicit env var
      # needed unless you want to override (e.g. semver tag like
      # "1.4.0" instead of the bare git SHA).
